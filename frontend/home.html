<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Language Game</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="./tailwind.config.js"></script>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="bg-ink text-white">
    <div class="page-shell">
      <header class="border-b border-line bg-black/80 backdrop-blur-sm">
        <div
          class="mx-auto flex min-h-16 w-full max-w-6xl items-center justify-between px-6 py-4"
        >
          <div>
            <span class="text-xs uppercase tracking-[0.35em] text-soft"
              >The Language Automata</span
            >
          </div>
          <nav>
            <button
              type="button"
              data-simulation-toggle
              class="retro-button px-4 py-2 text-sm uppercase tracking-[0.2em] text-soft transition"
            >
              Start Simulation
            </button>
          </nav>
        </div>
      </header>

      <main class="flex-1">
        <section class="mx-auto h-full w-full max-w-6xl px-6"></section>
      </main>

      <footer class="border-t border-line bg-black">
        <div
          class="mx-auto flex min-h-16 w-full max-w-6xl items-center justify-end px-6 py-4 text-sm text-soft"
        >
          <div class="flex items-center gap-6">
            <span class="flex items-center gap-2">
              <i class="fa-brands fa-github text-base" aria-hidden="true"></i>
              <a
                href="https://github.com/Gkuran"
                target="_blank"
                rel="noreferrer"
                class="footer-link"
              >
                Gkuran
              </a>
            </span>
            <span class="flex items-center gap-2">
              <i class="fa-brands fa-github text-base" aria-hidden="true"></i>
              <a
                href="https://github.com/lucasflores42"
                target="_blank"
                rel="noreferrer"
                class="footer-link"
              >
                lucasflores42
              </a>
            </span>
          </div>
        </div>
      </footer>
    </div>
    <script src="./scripts.js"></script>
  </body>
</html>
